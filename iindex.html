<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Happy 29th Birthday 💖</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Nunito', sans-serif;
            color: #3d2550;
        }

        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(145deg, #fce4ec, #ede7f6, #e8eaf6);
        }

        #bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 65% 55% at 25% 20%, rgba(255, 255, 255, .55), transparent), radial-gradient(ellipse 55% 45% at 80% 80%, rgba(255, 200, 230, .35), transparent);
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: .32;
            animation: orbD 14s ease-in-out infinite;
        }

        @keyframes orbD {

            0%,
            100% {
                transform: translate(0, 0)
            }

            40% {
                transform: translate(28px, -18px)
            }

            70% {
                transform: translate(-18px, 14px)
            }
        }

        #pts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .pt {
            position: absolute;
            opacity: 0;
            animation: ptF linear infinite;
        }

        @keyframes ptF {
            0% {
                opacity: 0;
                transform: translateY(0)
            }

            10% {
                opacity: .2
            }

            90% {
                opacity: .07
            }

            100% {
                opacity: 0;
                transform: translateY(-90px)
            }
        }

        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            z-index: 300;
            background: rgba(255, 255, 255, .2);
        }

        #tbfill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #F48FB1, #B39DDB, #FFD54F);
            transition: width .5s ease;
            border-radius: 0 2px 2px 0;
        }

        #pdots {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 300;
        }

        .pd {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(160, 120, 200, .22);
            transition: all .3s;
            cursor: pointer;
        }

        .pd.on {
            background: #B39DDB;
            transform: scale(1.55);
        }

        .pd.done {
            background: #f9c4d4;
        }

        #slides {
            position: fixed;
            inset: 0;
            z-index: 2;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 18px 90px;
            overflow-y: auto;
            overflow-x: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .slide.active {
            opacity: 1;
            pointer-events: all;
            animation: sIn .5s cubic-bezier(.22, 1, .36, 1) forwards;
        }

        .slide.exit {
            animation: sOut .4s cubic-bezier(.55, 0, 1, .45) forwards;
            pointer-events: none;
        }

        @keyframes sIn {
            from {
                opacity: 0;
                transform: translateX(52px) scale(.97)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes sOut {
            from {
                opacity: 1;
                transform: none
            }

            to {
                opacity: 0;
                transform: translateX(-52px) scale(.97)
            }
        }

        .si {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-top: 12px;
        }

        .sg>* {
            opacity: 0;
            animation: fuA .55s ease forwards;
        }

        .sg>*:nth-child(1) {
            animation-delay: .05s
        }

        .sg>*:nth-child(2) {
            animation-delay: .14s
        }

        .sg>*:nth-child(3) {
            animation-delay: .23s
        }

        .sg>*:nth-child(4) {
            animation-delay: .32s
        }

        @keyframes fuA {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        /* OS CARD */
        .card {
            background: rgba(255, 255, 255, .72);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border-radius: 26px;
            box-shadow: 0 20px 60px rgba(120, 80, 180, .16), 0 4px 16px rgba(0, 0, 0, .06);
            border: 1.5px solid rgba(255, 255, 255, .85);
            overflow: hidden;
            width: 100%;
        }

        .tbar {
            padding: 11px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(255, 255, 255, .4), rgba(255, 255, 255, .15));
            border-bottom: 1px solid rgba(255, 255, 255, .5);
        }

        .dots {
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
        }

        .dot.r {
            background: #FF6058;
        }

        .dot.y {
            background: #FFBD2E;
        }

        .dot.g {
            background: #28C840;
        }

        .tbar-lbl {
            font-size: 11px;
            letter-spacing: 3.5px;
            font-weight: 800;
            color: #7b5ea7;
            flex: 1;
            text-align: center;
            margin-right: 40px;
        }

        .cbody {
            padding: 22px 20px 26px;
        }

        /* WELCOME */
        .wphoto {
            width: 148px;
            height: 148px;
            border-radius: 24px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #fde8ef, #ede7f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: 0 8px 32px rgba(244, 143, 177, .25);
            overflow: hidden;
            position: relative;
        }

        .wphoto::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(255, 255, 255, .3), transparent);
            pointer-events: none;
        }

        .wphoto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .plabel {
            font-size: 10px;
            letter-spacing: 4px;
            color: #b09cc5;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }

        .whead {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(21px, 5.2vw, 28px);
            text-align: center;
            line-height: 1.6;
            color: #3d2550;
        }

        .whead em {
            color: #F48FB1;
            font-style: italic;
        }

        .whead strong {
            color: #B39DDB;
        }

        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .badge {
            background: rgba(255, 255, 255, .65);
            border: 1px solid rgba(255, 255, 255, .88);
            border-radius: 50px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #7b5ea7;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 10px rgba(180, 130, 200, .1);
        }

        /* NEXT ROW */
        .nrow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, .65);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 15px 18px;
            cursor: pointer;
            border: 1.5px solid rgba(255, 255, 255, .88);
            box-shadow: 0 8px 28px rgba(120, 80, 180, .1);
            transition: transform .25s, box-shadow .25s, background .25s;
            width: 100%;
        }

        .nrow:hover,
        .nrow:active {
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(120, 80, 180, .18);
            background: rgba(255, 255, 255, .88);
        }

        .nrl .nl-tag {
            font-size: 10px;
            letter-spacing: 3px;
            color: #b09cc5;
            font-weight: 800;
        }

        .nrl .nl-txt {
            font-family: 'Caveat', cursive;
            font-size: 20px;
            color: #7b5ea7;
            margin-top: 1px;
        }

        .narr {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, #F48FB1, #B39DDB);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(180, 130, 200, .35);
            transition: transform .25s;
        }

        .nrow:hover .narr {
            transform: scale(1.1) rotate(5deg);
        }

        /* ── GALLERY SLIDE ── */
        #s1 {
            padding: 0;
            overflow: hidden;
        }

        .gal-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        .gal-topbar {
            flex-shrink: 0;
            padding: 14px 14px 0;
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
        }

        .gal-topcard {
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            border: 1.5px solid rgba(255, 255, 255, .9);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(120, 80, 180, .1);
        }

        .gal-hint {
            font-family: 'Caveat', cursive;
            font-size: 15px;
            color: #F48FB1;
            text-align: center;
            padding: 6px 0 2px;
            flex-shrink: 0;
        }

        /* clothesline scroll */
        .gal-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 10px 8px;
        }

        .gal-scroll::-webkit-scrollbar {
            display: none;
        }

        .cline-row {
            position: relative;
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2.5vw, 20px);
            padding: 30px 6px 18px;
            flex-wrap: nowrap;
        }

        .cline-row::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 3%;
            right: 3%;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(180, 140, 100, .5) 10%, rgba(160, 120, 80, .6) 50%, rgba(180, 140, 100, .5) 90%, transparent);
            border-radius: 2px;
        }

        /* POLAROID */
        .pol {
            flex-shrink: 0;
            width: clamp(100px, 22vw, 148px);
            background: #fff;
            padding: clamp(6px, 1.4vw, 9px) clamp(6px, 1.4vw, 9px) clamp(22px, 5vw, 32px);
            border-radius: 3px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, .22), 0 1px 4px rgba(0, 0, 0, .1);
            cursor: pointer;
            position: relative;
            transform-origin: top center;
            animation: polSway 4s ease-in-out infinite;
            z-index: 1;
            transition: z-index 0s;
        }

        @keyframes polSway {

            0%,
            100% {
                transform: var(--t) translateY(0)
            }

            50% {
                transform: var(--t) translateY(-3px)
            }
        }

        .pol:hover,
        .pol.fl {
            animation: none;
            transform: scale(1.13) rotate(0deg) translateY(-9px) !important;
            box-shadow: 0 18px 56px rgba(0, 0, 0, .3);
            z-index: 20;
        }

        /* clothespin */
        .pol::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 13px;
            height: 22px;
            background: linear-gradient(to bottom, #d4a96a, #a07840);
            border-radius: 3px 3px 1px 1px;
            box-shadow: 1px 1px 4px rgba(0, 0, 0, .28);
        }

        .pol::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 3px;
            background: rgba(0, 0, 0, .18);
            border-radius: 2px;
        }

        .pol-img {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: linear-gradient(135deg, #fde8ef, #ede7f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
        }

        .pol-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .pol-ov {
            position: absolute;
            inset: 0;
            background: rgba(60, 20, 80, .88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 7px;
            text-align: center;
            gap: 4px;
            opacity: 0;
            transition: opacity .3s;
        }

        .pol:hover .pol-ov,
        .pol.fl .pol-ov {
            opacity: 1;
        }

        .pol-date {
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255, 210, 230, .75);
            font-weight: 700;
        }

        .pol-story {
            font-family: 'Caveat', cursive;
            font-size: 11px;
            color: #fff;
            line-height: 1.5;
        }

        .pol-secret {
            font-family: 'Caveat', cursive;
            font-size: 10px;
            color: #FFD54F;
        }

        .pol-cap {
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: clamp(10px, 2vw, 13px);
            color: #666;
            margin-top: 5px;
            line-height: 1.2;
        }

        /* gallery bottom nav */
        .gal-bot {
            flex-shrink: 0;
            padding: 10px 14px 14px;
            display: flex;
            gap: 10px;
            justify-content: center;
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
        }

        .gbtn {
            padding: 11px 22px;
            border-radius: 50px;
            background: rgba(255, 255, 255, .8);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, .9);
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 800;
            color: #7b5ea7;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(120, 80, 180, .12);
            letter-spacing: 1px;
            transition: all .25s;
        }

        .gbtn:hover {
            transform: translateY(-2px);
        }

        .gbtn.pri {
            background: linear-gradient(135deg, #F48FB1, #B39DDB);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 24px rgba(180, 130, 200, .3);
        }

        /* ── TIMELINE ── */
        .tl-scroll {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            padding: 4px 0 8px;
        }

        .tl-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .tl-scroll::-webkit-scrollbar-thumb {
            background: #f9c4d4;
            border-radius: 4px;
        }

        .tl-year {
            display: flex;
            gap: 0;
            cursor: pointer;
            transition: background .2s;
            position: relative;
        }

        .tl-year:hover {
            background: rgba(255, 255, 255, .45);
        }

        .tl-line-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 0;
            width: 56px;
            flex-shrink: 0;
        }

        .tl-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(180, 130, 200, .35);
            transition: transform .3s;
        }

        .tl-year:hover .tl-dot,
        .tl-year.open .tl-dot {
            transform: scale(1.35);
        }

        .tl-vline {
            flex: 1;
            width: 2px;
            background: linear-gradient(to bottom, #f9c4d4, #d4c5f9);
            margin-top: 4px;
            min-height: 24px;
        }

        .tl-year:last-child .tl-vline {
            display: none;
        }

        .tl-body {
            padding: 14px 16px 10px 0;
            flex: 1;
        }

        .tl-num {
            font-size: 10px;
            letter-spacing: 3px;
            color: #b09cc5;
            font-weight: 800;
            margin-bottom: 3px;
        }

        .tl-event {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            color: #3d2550;
            font-weight: 600;
            line-height: 1.3;
        }

        .tl-desc {
            font-size: 12px;
            color: #b09cc5;
            margin-top: 3px;
            line-height: 1.5;
        }

        .tl-hidden {
            display: none;
            margin-top: 10px;
            padding: 12px 14px;
            background: rgba(249, 196, 212, .18);
            border-radius: 12px;
            font-family: 'Caveat', cursive;
            font-size: 16px;
            color: #7b5ea7;
            line-height: 1.7;
            border-left: 3px solid #F48FB1;
        }

        .tl-year.open .tl-hidden {
            display: block;
            animation: fuA .4s ease;
        }

        /* gold year (Year 10) */
        .tl-year.gold .tl-num {
            color: #FFD54F;
        }

        .tl-year.gold .tl-dot {
            background: #FFD54F !important;
        }

        .tl-year.gold .tl-hidden {
            background: rgba(255, 213, 79, .12);
            border-left-color: #FFD54F;
            color: #8a6800;
        }
    </style>
</head>

<body>

    <div id="bg">
        <div class="orb" style="width:300px;height:300px;top:-70px;left:-50px;background:rgba(249,196,212,.5);"></div>
        <div class="orb"
            style="width:250px;height:250px;bottom:-50px;right:-40px;background:rgba(212,197,249,.5);animation-delay:3.5s;">
        </div>
        <div class="orb"
            style="width:170px;height:170px;top:45%;left:62%;background:rgba(255,210,180,.42);animation-delay:7s;">
        </div>
    </div>
    <div id="pts"></div>
    <div id="topbar">
        <div id="tbfill"></div>
    </div>
    <div id="pdots"></div>

    <div id="slides">

        <!-- S0 WELCOME -->
        <div class="slide active" id="s0">
            <div class="si sg">
                <div class="card">
                    <div class="tbar">
                        <div class="dots">
                            <div class="dot r"></div>
                            <div class="dot y"></div>
                            <div class="dot g"></div>
                        </div>
                        <div class="tbar-lbl">BIRTHDAY-SURPRISE.EXE</div>
                    </div>
                    <div class="cbody" style="text-align:center;">
                        <div class="wphoto" id="wphoto">🌹</div>
                        <div class="plabel">LITTLE MESSAGE</div>
                        <div class="whead">
                            Hey! It's your birthday and<br />
                            I <em>had</em> to do something special…<br /><br />
                            Happy <strong>29th</strong>, my love. ❤️<br />
                            This one's all yours.
                        </div>
                    </div>
                </div>
                <div class="badges">
                    <div class="badge">🎂 29th Birthday</div>
                    <div class="badge">💖 10 Years</div>
                    <div class="badge">💍 Forever</div>
                </div>
                <button class="nrow" onclick="goTo(1)">
                    <div class="nrl">
                        <div class="nl-tag">READY FOR NEXT</div>
                        <div class="nl-txt">Our Photos 📸</div>
                    </div>
                    <div class="narr">›</div>
                </button>
            </div>
        </div>

        <!-- S1 GALLERY -->
        <div class="slide" id="s1">
            <div class="gal-inner">
                <div class="gal-topbar">
                    <div class="gal-topcard">
                        <div class="dots">
                            <div class="dot r"></div>
                            <div class="dot y"></div>
                            <div class="dot g"></div>
                        </div>
                        <div class="tbar-lbl" style="margin-right:40px;">PHOTO-GALLERY.EXE</div>
                    </div>
                </div>
                <p class="gal-hint">Tap a photo to read its story 💌</p>
                <div class="gal-scroll" id="galcont"></div>
                <div class="gal-bot">
                    <button class="gbtn" onclick="goTo(0)">← Back</button>
                    <button class="gbtn pri" onclick="goTo(2)">Our Timeline →</button>
                </div>
            </div>
        </div>

        <!-- S2 TIMELINE -->
        <div class="slide" id="s2">
            <div class="si sg">
                <div class="card">
                    <div class="tbar">
                        <div class="dots">
                            <div class="dot r"></div>
                            <div class="dot y"></div>
                            <div class="dot g"></div>
                        </div>
                        <div class="tbar-lbl">OUR-JOURNEY.EXE</div>
                    </div>
                    <div style="padding:6px 0 2px;text-align:center;">
                        <p style="font-family:'Caveat',cursive;font-size:15px;color:#F48FB1;padding:8px 0 4px;">Tap a
                            year to open the memory 💌</p>
                    </div>
                    <div class="tl-scroll" id="tlscroll"></div>
                </div>
                <button class="nrow" onclick="goTo(3)">
                    <div class="nrl">
                        <div class="nl-tag">READY FOR NEXT</div>
                        <div class="nl-txt">More coming… ✨</div>
                    </div>
                    <div class="narr">›</div>
                </button>
            </div>
        </div>

        <!-- placeholder s3 -->
        <div class="slide" id="s3">
            <div class="si" style="justify-content:center;height:100%;align-items:center;">
                <p style="font-family:'Caveat',cursive;font-size:24px;color:#b09cc5;text-align:center;">More coming… ✨
                </p>
            </div>
        </div>

    </div>

    <script>
        /* PARTICLES */
        const pts = document.getElementById('pts');

        /* SLIDE ENGINE */
        const TOTAL = 4; let cur = 0;
        function goTo(idx) {
            const p = document.getElementById('s' + cur), n = document.getElementById('s' + idx);
            if (!n || idx === cur) return;
            p.classList.remove('active'); p.classList.add('exit');
            setTimeout(() => p.classList.remove('exit'), 420);
            n.classList.add('active'); cur = idx; updateUI();
            if (idx === 1) buildGallery();
            if (idx === 2) buildTimeline();
        }
        function updateUI() {
            document.getElementById('tbfill').style.width = ((cur / (TOTAL - 1)) * 100) + '%';
            document.querySelectorAll('.pd').forEach((d, i) => { d.classList.toggle('on', i === cur); d.classList.toggle('done', i < cur); });
        }
        const pd = document.getElementById('pdots');
        for (let i = 0; i < TOTAL; i++) { const d = document.createElement('div'); d.className = 'pd' + (i === 0 ? ' on' : ''); d.onclick = () => goTo(i); pd.appendChild(d); }

                    card.addEventListener('click', () => card.classList.toggle('fl'));
                    row.appendChild(card);
                });
                c.appendChild(row);
